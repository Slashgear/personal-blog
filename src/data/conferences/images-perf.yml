title: "Au secours ! Mes images pourrissent mes perfs"
year: 2026
lang: fr
description: |
  Les images représentent souvent plus de 50% du poids d'une page web. Mal optimisées ou mal servies,
  elles deviennent un goulot d'étranglement pour les performances (notamment le LCP) et l'expérience utilisateur...

  Pourtant, gérer les images ne se limite pas à choisir entre JPEG, WebP ou AVIF : cela touche aussi à l'architecture du projet.

  Dans ce talk, nous partagerons notre retour d'expérience sur la gestion des images dans des projets web : formats adaptés,
  responsive, lazy load, automatisation de l'optimisation dans la chaîne de build, mais aussi choix d'architectures
  pour servir efficacement les assets.
